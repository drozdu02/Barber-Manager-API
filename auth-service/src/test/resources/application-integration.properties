spring.autoconfigure.exclude=

spring.datasource.url=jdbc:h2:mem:auth_integration;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.cloud.config.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.config.import=

auth.refresh-cookie.name=refreshToken
auth.refresh-cookie.path=/auth
auth.refresh-cookie.secure=false
auth.refresh-cookie.same-site=None
