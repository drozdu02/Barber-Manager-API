server.port=8080
spring.application.name=api-gateway-service

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**,/users
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/users(?<segment>/?.*), /api/v1/users${segment}

spring.cloud.gateway.server.webflux.routes[4].id=user-service-barbers
spring.cloud.gateway.server.webflux.routes[4].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/barbers,/barbers/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/barbers(?<segment>/?.*), /api/v1/barbers${segment}

spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[2].id=auth-service-jwks
spring.cloud.gateway.server.webflux.routes[2].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/.well-known/jwks.json

spring.cloud.gateway.server.webflux.routes[3].id=appointment-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://appointment-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/services/**,/availability/**,/appointments/**,/appointments,/barber/**,/admin/**

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

logging.level.org.springframework.cloud.gateway=DEBUG

eureka.client.registry-fetch-interval-seconds=5

#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8082/.well-known/jwks.json
